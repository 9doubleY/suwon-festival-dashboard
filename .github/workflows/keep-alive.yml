name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          curl -s -o /dev/null -w "Status: %{http_code}\n" \
            https://suwon-festival-dashboard-lgspbjfcwfdme6oaqkdtw4.streamlit.app/
